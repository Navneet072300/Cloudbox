name: CI — Build & Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION:   us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  # ─── Backend ────────────────────────────────────────────────────────────────
  backend:
    name: Backend — lint, test, build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Type-check
        run: npx tsc --noEmit
        working-directory: backend

      - name: Build
        run: npm run build
        working-directory: backend

      - name: Configure AWS credentials
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push backend image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/cloudbox-prod/backend:latest
            ${{ env.ECR_REGISTRY }}/cloudbox-prod/backend:sha-${{ github.sha }}
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/cloudbox-prod/backend:latest
          cache-to:   type=inline

  # ─── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — lint, build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Type-check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: https://api.${{ secrets.DOMAIN_NAME }}/api
          NEXT_PUBLIC_WS_URL:  wss://api.${{ secrets.DOMAIN_NAME }}

      - name: Configure AWS credentials
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push frontend image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.${{ secrets.DOMAIN_NAME }}/api
            NEXT_PUBLIC_WS_URL=wss://api.${{ secrets.DOMAIN_NAME }}
          tags: |
            ${{ env.ECR_REGISTRY }}/cloudbox-prod/frontend:latest
            ${{ env.ECR_REGISTRY }}/cloudbox-prod/frontend:sha-${{ github.sha }}
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/cloudbox-prod/frontend:latest
          cache-to:   type=inline
