name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION:  us-east-1
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  EKS_CLUSTER:  dropbox-production

jobs:
  # ─── Test Backend ─────────────────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dropbox_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        run: npm ci
        working-directory: backend

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: backend

      - name: Run migrations
        run: npx prisma migrate deploy
        working-directory: backend
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/dropbox_test

      - name: Type check
        run: npm run type-check
        working-directory: backend

      - name: Test
        run: npm test
        working-directory: backend
        env:
          NODE_ENV:     test
          DATABASE_URL: postgresql://test:test@localhost:5432/dropbox_test
          REDIS_HOST:   localhost
          REDIS_PORT:   6379
          JWT_SECRET:   test-jwt-secret-32-chars-minimum!!

  # ─── Test Frontend ────────────────────────────────────────────────
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run type-check
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend

  # ─── Build & Push Images ─────────────────────────────────────────
  build:
    name: Build & Push
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      tag: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context:    ./backend
          platforms:  linux/amd64,linux/arm64
          push:       true
          tags: |
            ${{ env.ECR_REGISTRY }}/dropbox-backend:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/dropbox-backend:latest
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,mode=max,scope=backend

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context:    ./frontend
          platforms:  linux/amd64,linux/arm64
          push:       true
          tags: |
            ${{ env.ECR_REGISTRY }}/dropbox-frontend:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/dropbox-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,mode=max,scope=frontend
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.cloudbox.app/api
            NEXT_PUBLIC_WS_URL=wss://api.cloudbox.app

  # ─── Deploy ───────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://cloudbox.app
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Substitute image tags
        run: |
          TAG=${{ github.sha }}
          sed -i "s|REGISTRY/dropbox-backend:TAG|${{ env.ECR_REGISTRY }}/dropbox-backend:${TAG}|g" infra/k8s/backend.yaml
          sed -i "s|REGISTRY/dropbox-frontend:TAG|${{ env.ECR_REGISTRY }}/dropbox-frontend:${TAG}|g" infra/k8s/frontend.yaml

      - name: Apply manifests
        run: |
          kubectl apply -f infra/k8s/namespace.yaml
          kubectl apply -f infra/k8s/backend.yaml
          kubectl apply -f infra/k8s/frontend.yaml
          kubectl apply -f infra/k8s/ingress.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend  -n dropbox --timeout=5m
          kubectl rollout status deployment/frontend -n dropbox --timeout=5m

      - name: Smoke test
        run: |
          sleep 10
          curl -sf https://api.cloudbox.app/health | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='ok'"
          echo "Production health check passed ✓"

      - name: Notify on failure
        if: failure()
        run: echo "Deploy failed — check logs at ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
