name: Deploy to EKS

on:
  workflow_run:
    workflows: ["CI — Build & Push"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (default: latest)"
        required: false
        default: "latest"

env:
  AWS_REGION:   us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  CLUSTER_NAME: cloudbox-prod
  NAMESPACE:    cloudbox

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    # Requires a GitHub Environment named "production" with protection rules.
    # Create it at: Settings → Environments → New environment → production
    # environment:
    #   name: production
    #   url: https://YOUR_DOMAIN
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name   ${{ env.CLUSTER_NAME }}

      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "value=sha-${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Apply namespace
        run: kubectl apply -f infrastructure/k8s/namespace.yaml

      - name: Apply External Secrets store + sync
        run: |
          kubectl apply -f infrastructure/k8s/backend/clustersecretstore.yaml
          kubectl apply -f infrastructure/k8s/backend/externalsecret.yaml
          # Wait up to 60s for ESO to fetch and create the backend-secret
          kubectl wait externalsecret/backend-secret \
            -n ${{ env.NAMESPACE }} \
            --for=condition=Ready \
            --timeout=60s

      - name: Apply Kafka
        run: kubectl apply -f infrastructure/k8s/kafka/

      - name: Run Prisma migrations
        run: |
          DB_URL=$(kubectl get secret backend-secret \
            -n ${{ env.NAMESPACE }} \
            -o jsonpath='{.data.DATABASE_URL}' | base64 -d)
          kubectl run prisma-migrate-${{ github.run_number }} \
            --namespace=${{ env.NAMESPACE }} \
            --image=${{ env.ECR_REGISTRY }}/cloudbox-prod/backend:${{ steps.tag.outputs.value }} \
            --restart=Never \
            --env="DATABASE_URL=${DB_URL}" \
            --command -- npx prisma migrate deploy
          kubectl wait pod/prisma-migrate-${{ github.run_number }} \
            -n ${{ env.NAMESPACE }} \
            --for=condition=Completed \
            --timeout=120s \
            || (kubectl logs prisma-migrate-${{ github.run_number }} -n ${{ env.NAMESPACE }} && exit 1)
          kubectl delete pod prisma-migrate-${{ github.run_number }} \
            -n ${{ env.NAMESPACE }} --ignore-not-found

      - name: Deploy backend
        run: |
          kubectl apply -f infrastructure/k8s/backend/configmap.yaml
          kubectl apply -f infrastructure/k8s/backend/serviceaccount.yaml
          kubectl apply -f infrastructure/k8s/backend/service.yaml
          kubectl apply -f infrastructure/k8s/backend/hpa.yaml
          kubectl set image deployment/backend \
            backend=${{ env.ECR_REGISTRY }}/cloudbox-prod/backend:${{ steps.tag.outputs.value }} \
            -n ${{ env.NAMESPACE }} \
            || kubectl apply -f infrastructure/k8s/backend/deployment.yaml
          # Patch image in case deployment was just created
          kubectl set image deployment/backend \
            backend=${{ env.ECR_REGISTRY }}/cloudbox-prod/backend:${{ steps.tag.outputs.value }} \
            -n ${{ env.NAMESPACE }}

      - name: Deploy frontend
        run: |
          kubectl apply -f infrastructure/k8s/frontend/service.yaml
          kubectl apply -f infrastructure/k8s/frontend/hpa.yaml
          kubectl set image deployment/frontend \
            frontend=${{ env.ECR_REGISTRY }}/cloudbox-prod/frontend:${{ steps.tag.outputs.value }} \
            -n ${{ env.NAMESPACE }} \
            || kubectl apply -f infrastructure/k8s/frontend/deployment.yaml
          kubectl set image deployment/frontend \
            frontend=${{ env.ECR_REGISTRY }}/cloudbox-prod/frontend:${{ steps.tag.outputs.value }} \
            -n ${{ env.NAMESPACE }}

      - name: Apply Ingress
        run: kubectl apply -f infrastructure/k8s/ingress/ingress.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend  -n ${{ env.NAMESPACE }} --timeout=180s
          kubectl rollout status deployment/frontend -n ${{ env.NAMESPACE }} --timeout=180s

      - name: Smoke test + auto-rollback on failure
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://api.${{ secrets.DOMAIN_NAME }}/health)
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed (HTTP $STATUS) — rolling back"
            kubectl rollout undo deployment/backend  -n ${{ env.NAMESPACE }}
            kubectl rollout undo deployment/frontend -n ${{ env.NAMESPACE }}
            exit 1
          fi
          echo "Smoke test passed (HTTP $STATUS)"
