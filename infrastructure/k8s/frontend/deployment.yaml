apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: cloudbox
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: frontend
    spec:
      terminationGracePeriodSeconds: 30

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: frontend

      containers:
        - name: frontend
          image: 061640054424.dkr.ecr.us-east-1.amazonaws.com/cloudbox-prod/frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http

          env:
            - name:  NEXT_PUBLIC_API_URL
              value: "http://REPLACE_ALB_HOSTNAME/api"
            - name:  NEXT_PUBLIC_WS_URL
              value: "ws://REPLACE_ALB_HOSTNAME"
            - name:  HOSTNAME
              value: "0.0.0.0"
            - name:  PORT
              value: "3000"

          resources:
            requests:
              cpu:    "100m"
              memory: "128Mi"
            limits:
              cpu:    "500m"
              memory: "512Mi"

          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds:       20

          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds:       10

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: frontend
                topologyKey: kubernetes.io/hostname
