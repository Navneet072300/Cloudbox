# DO NOT commit real values — this is a template.
# In CI/CD, generate this file from AWS Secrets Manager / Terraform outputs.
#
# Create with:
#   kubectl create secret generic backend-secret -n cloudbox \
#     --from-literal=DATABASE_URL="postgresql://user:pass@rds-host:5432/cloudbox" \
#     --from-literal=REDIS_URL="redis://elasticache-host:6379" \
#     --from-literal=JWT_SECRET="$(openssl rand -hex 32)" \
#     --from-literal=JWT_REFRESH_SECRET="$(openssl rand -hex 32)" \
#     --from-literal=KAFKA_BROKERS="kafka-0.kafka-headless:9092,kafka-1.kafka-headless:9092"
#
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: cloudbox
type: Opaque
stringData:
  DATABASE_URL:       "postgresql://cloudbox:CHANGE_ME@REPLACE_RDS_HOST:5432/cloudbox"
  REDIS_URL:          "redis://REPLACE_REDIS_HOST:6379"
  JWT_SECRET:         "REPLACE_WITH_RANDOM_32_BYTES"
  JWT_REFRESH_SECRET: "REPLACE_WITH_RANDOM_32_BYTES"
  KAFKA_BROKERS:      "kafka-0.kafka-headless.cloudbox.svc.cluster.local:9092"
