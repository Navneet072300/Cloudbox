# ExternalSecret — fetches cloudbox-prod/backend from AWS Secrets Manager
# and writes it as a native Kubernetes Secret named "backend-secret".
# The backend Deployment already references this Secret via envFrom.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backend-secret
  namespace: cloudbox
spec:
  # How often to re-sync from AWS (also syncs on pod restart)
  refreshInterval: 1h

  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager

  target:
    name: backend-secret          # name of the Kubernetes Secret to create/update
    creationPolicy: Owner         # ESO owns this Secret; deleting ExternalSecret deletes it too
    deletionPolicy: Retain        # keep the K8s Secret if ExternalSecret is deleted

  # AWS Secrets Manager stores everything as a single JSON blob.
  # dataFrom extracts all keys automatically — no need to list each one.
  dataFrom:
    - extract:
        key: cloudbox-prod/backend    # matches the secret name in secrets.tf
