apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: cloudbox
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "4000"
        prometheus.io/path:   "/metrics"
    spec:
      serviceAccountName: backend
      terminationGracePeriodSeconds: 60

      # Spread pods across nodes for HA
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: backend

      containers:
        - name: backend
          image: 061640054424.dkr.ecr.us-east-1.amazonaws.com/cloudbox-prod/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
              name: http

          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret

          resources:
            requests:
              cpu:    "250m"
              memory: "256Mi"
            limits:
              cpu:    "1000m"
              memory: "512Mi"

          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds:       20
            failureThreshold:    3

          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds:       10
            failureThreshold:    3

          lifecycle:
            preStop:
              exec:
                # Wait for in-flight requests to drain before shutdown
                command: ["/bin/sh", "-c", "sleep 5"]

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: backend
                topologyKey: kubernetes.io/hostname
