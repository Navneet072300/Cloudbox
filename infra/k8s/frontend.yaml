apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: dropbox
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: REGISTRY/dropbox-frontend:TAG
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.cloudbox.app/api"
            - name: NEXT_PUBLIC_WS_URL
              value: "wss://api.cloudbox.app"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: dropbox
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 3000
