groups:
  - name: cloudbox.api
    interval: 30s
    rules:
      - alert: HighErrorRate
        expr: |
          sum(rate(http_requests_total{status_code=~"5.."}[5m]))
          /
          sum(rate(http_requests_total[5m])) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High HTTP 5xx error rate ({{ $value | humanizePercentage }})"
          description: "More than 5% of requests are returning 5xx errors over the last 5 minutes."

      - alert: HighLatencyP99
        expr: |
          histogram_quantile(0.99,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (le, route)
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P99 latency above 2s on {{ $labels.route }}"
          description: "The 99th percentile response time for {{ $labels.route }} exceeds 2 seconds."

      - alert: APIDown
        expr: up{job="cloudbox-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backend API is down"
          description: "The CloudBox backend has not been scraped successfully for 1 minute."

  - name: cloudbox.infra
    interval: 60s
    rules:
      - alert: PostgresDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is unreachable"

      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is unreachable"

      - alert: HighMemoryUsage
        expr: |
          process_resident_memory_bytes{job="cloudbox-backend"}
          / (1024 * 1024 * 1024) > 1.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Backend memory usage above 1.5 GB"
          description: "Resident memory is {{ $value | humanize }}GB — consider investigating leaks."

      - alert: WebSocketConnectionsHigh
        expr: websocket_connections_active > 10000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "WebSocket connection count is very high ({{ $value }})"

  - name: cloudbox.uploads
    interval: 60s
    rules:
      - alert: UploadFailureRateHigh
        expr: |
          sum(rate(upload_files_total{status="failed"}[10m]))
          /
          sum(rate(upload_files_total[10m])) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Upload failure rate above 10%"
          description: "More than 10% of file uploads are failing over the last 10 minutes."
